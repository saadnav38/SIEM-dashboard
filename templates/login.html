<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIEM Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 40px;
            width: 380px;
        }
        .login-box h1 {
            color: #58a6ff;
            font-size: 22px;
            margin-bottom: 8px;
            text-align: center;
        }
        .login-box p {
            color: #8b949e;
            font-size: 13px;
            text-align: center;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            color: #8b949e;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #58a6ff;
        }
        .login-btn {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            font-size: 14px;
            border-radius: 6px;
        }
        .error-msg {
            background: #3d1a1a;
            border: 1px solid #f85149;
            color: #f85149;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <h1>SIEM Dashboard</h1>
            <p>Security Operations Center</p>
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}
            <form method="POST" action="/login">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Enter username" required autofocus>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>
        </div>
    </div>
</body>
</html>
